<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>marker</title>
    <link rel="stylesheet" href="/src/styles/app.css" />
    <link rel="stylesheet" href="/src/styles/markdown.css" />
    <link rel="stylesheet" href="/src/styles/highlight.css" />
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <button
          id="sidebar-toggle"
          class="btn icon-btn"
          title="Hide sidebar ([)"
          aria-label="Toggle sidebar"
          aria-expanded="true"
        >
          ☰
        </button>
        <button
          id="open-btn"
          class="btn icon-btn"
          title="Open Markdown file (⌘O)"
          aria-label="Open Markdown file"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path
              d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"
            />
          </svg>
        </button>
        <span id="file-name" class="file-name"></span>
        <div class="settings">
          <button
            id="settings-btn"
            class="btn icon-btn"
            title="Settings"
            aria-label="Settings"
            aria-haspopup="true"
            aria-expanded="false"
          >
            ⚙
          </button>
          <div id="settings-panel" class="settings-panel">
            <label class="settings-row">
              <span>Font</span>
              <select id="font-select"></select>
            </label>
            <label class="settings-row">
              <span>Size</span>
              <select id="size-select"></select>
            </label>
            <label class="settings-row">
              <span>Theme</span>
              <select id="theme-select">
                <option value="system">System</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </label>
          </div>
        </div>
      </header>
      <div class="body">
        <nav id="toc" class="toc" aria-label="Table of contents"></nav>
        <main id="content" class="content">
          <div id="empty" class="empty">
            <h1>marker</h1>
            <p>A minimal Markdown viewer.</p>
            <p class="hint">
              Drag &amp; drop a <code>.md</code> file here, or click
              <strong>Open</strong>.
            </p>
          </div>
          <article id="doc" class="markdown-body"></article>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
